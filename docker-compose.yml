# Stack completo do backend em Docker. Sobe tudo com um comando:
#   docker compose up --build -d
# Copie .env.example → .env e preencha ANTHROPIC_API_KEY para ligar o Claude.
#
# O app hoje roda com dados EM MEMÓRIA (leve e instantâneo). Postgres (pgvector)
# e Redis já sobem prontos para quando ligar a persistência real (Prisma + RAG).
services:
  app:
    build: .
    image: brecha-ai
    container_name: brecha-ai
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_CORE_MODEL: ${AI_CORE_MODEL:-claude-opus-4-8}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # Prontas para uso quando a persistência real for ligada:
      DATABASE_URL: postgresql://brecha:brecha@db:5432/brecha
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: pgvector/pgvector:pg16
    container_name: brecha-db
    environment:
      POSTGRES_USER: brecha
      POSTGRES_PASSWORD: brecha
      POSTGRES_DB: brecha
    ports:
      - "5433:5432" # host 5433 p/ não colidir com outros Postgres locais
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brecha -d brecha"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: brecha-redis
    ports:
      - "6380:6379" # host 6380 p/ não colidir com outros Redis locais
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
